name: TappyHour
options:
  bundleIdPrefix: com.tappyhour
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.tappyhour.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  TappyHour:
    type: application
    platform: iOS
    sources:
      - path: TappyHour
        excludes:
          - "**/*.md"
    settings:
      base:
        INFOPLIST_FILE: TappyHour/Info.plist
        CODE_SIGN_ENTITLEMENTS: TappyHour/TappyHour.entitlements
        PRODUCT_NAME: TappyHour
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: ""
    dependencies:
      - framework: MapKit.framework
        embed: false
      - framework: CoreLocation.framework
        embed: false
      - package: Supabase
        product: Supabase
